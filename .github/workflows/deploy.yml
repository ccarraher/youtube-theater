name: Deploy images
on:
  push:
    branches: [main]

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> $GITHUB_PATH

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Generate compose + build images
        env:
          Parameters__RegistryEndpoint: registry.digitalocean.com
          Parameters__RegistryRepository: yt-theater-container-registry
        run: aspire do prepare-prod -o ./deploy-out

      - name: Push images
        run: aspire do push

      - name: Inspect generated artifacts
        run: ls -la deploy-out

      - name: Copy compose + env to droplet
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_KEY_PASSPHRASE }}
          port: 9090
          source: "deploy-out/docker-compose.yaml,deploy-out/.env,deploy-out/.env.Production"
          target: "~/youtube-app"
          strip_components: 1

      - name: Deploy on droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_KEY_PASSPHRASE }}
          port: 9090
          envs: DO_TOKEN
          script: |
            cd ~/youtube-app
            echo "$DO_TOKEN" | docker login registry.digitalocean.com -u "$DO_TOKEN" --password-stdin
            docker compose --env-file .env --env-file .env.Production pull
            docker compose --env-file .env --env-file .env.Production up -d
        env:
          DO_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
